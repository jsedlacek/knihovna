name: Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: storybook-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    permissions:
      contents: write
      pull-requests: write

    env:
      FORCE_COLOR: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine deploy path
        id: path
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "dir=latest" >> "$GITHUB_OUTPUT"
          else
            echo "dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Storybook
        run: pnpm storybook:build
        env:
          STORYBOOK_BASE: /knihovna/${{ steps.path.outputs.dir }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: ${{ steps.path.outputs.dir }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const dir = '${{ steps.path.outputs.dir }}';
            const url = `https://jsedlacek.github.io/knihovna/${dir}/`;
            const body = `## Storybook Preview\n\n**URL:** ${url}\n\nDeployed from commit ${context.sha.substring(0, 7)}.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Storybook Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Remove PR directory
        run: |
          DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$DIR"
            git commit -m "Clean up Storybook preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi

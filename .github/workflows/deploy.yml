name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force-fresh-scrape:
        description: "Force fresh scraping of all data (ignore existing cache)"
        type: boolean
        default: false
      force-mlp-scrape:
        description: "Force re-scraping MLP details only (images, downloads, genres)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache data directory
        uses: actions/cache@v5
        with:
          path: public/data/
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: Run scraper
        run: |
          SCRAPE_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force-fresh-scrape }}" = "true" ]; then
              SCRAPE_ARGS="--force"
            elif [ "${{ inputs.force-mlp-scrape }}" = "true" ]; then
              SCRAPE_ARGS="--force-mlp"
            fi
          fi
          pnpm run scrape $SCRAPE_ARGS

      - name: Build site
        run: pnpm run build

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
